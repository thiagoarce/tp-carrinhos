<script>
(function() {
  'use strict';

  // ====== Estado ======
  var state = {
    pontos: [], horarios: [], equipamentos: [], equipamentoLocais: [],
    publicadores: [], feriados: []
  };
  var ui = {
    view: 'planner',
    semanaInicio: inicioDaSemana(new Date()),
    mesAtual: ymdHoje().substring(0, 7),
    agsSemana: [],            // cache leve dos agendamentos da semana atual
    mapa: null, marcador: null,
    sortables: []             // referências dos Sortable pra destruir ao re-render
  };

  var DIAS = ['Domingo', 'Segunda', 'Terça', 'Quarta', 'Quinta', 'Sexta', 'Sábado'];
  var DIAS_CURTOS = ['DOM', 'SEG', 'TER', 'QUA', 'QUI', 'SEX', 'SÁB'];
  var MESES = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];

  // ====== Utils ======
  function $(s, root) { return (root || document).querySelector(s); }
  function $$(s, root) { return Array.prototype.slice.call((root || document).querySelectorAll(s)); }
  function esc(s) {
    if (s === null || s === undefined) return '';
    return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }
  function tst(m, t, d) { if (window.toast) window.toast(m, t, d); }
  function pad(n) { return String(n).padStart(2, '0'); }
  function ymd(d) { return d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate()); }
  function ymdHoje() { return ymd(new Date()); }
  function inicioDaSemana(d) {
    var x = new Date(d.getFullYear(), d.getMonth(), d.getDate());
    x.setDate(x.getDate() - x.getDay()); // domingo
    return x;
  }
  function adicionarDias(d, n) {
    var x = new Date(d.getFullYear(), d.getMonth(), d.getDate());
    x.setDate(x.getDate() + n);
    return x;
  }
  function fmtDataCurta(d) { return pad(d.getDate()) + '/' + pad(d.getMonth() + 1); }
  function rpc(nome) {
    var args = Array.prototype.slice.call(arguments, 1);
    return new Promise(function(resolve, reject) {
      google.script.run.withSuccessHandler(resolve).withFailureHandler(reject)[nome].apply(null, args);
    });
  }
  function trataErro(err) {
    var msg = (err && err.message) ? err.message : String(err);
    tst(msg, 'error');
    console.error(err);
  }

  // ====== Boot ======
  document.addEventListener('DOMContentLoaded', boot);
  function boot() {
    $$('[data-view]').forEach(function(el) {
      el.addEventListener('click', function() { irPara(el.dataset.view); });
    });
    $('#btnMenu').addEventListener('click', function() { $('#sidebar').classList.toggle('open'); });
    $('#btnLinkPublico').addEventListener('click', copiarLinkPublico);
    $('#btnRecarregar').addEventListener('click', function() {
      rpc('limparCacheServidor').then(carregarTudo);
    });
    $('#btnConfHorarios').addEventListener('click', function() { irPara('horarios'); });

    $('#weekPrev').addEventListener('click', function() { ui.semanaInicio = adicionarDias(ui.semanaInicio, -7); renderPlanner(); });
    $('#weekNext').addEventListener('click', function() { ui.semanaInicio = adicionarDias(ui.semanaInicio, 7); renderPlanner(); });
    $('#weekToday').addEventListener('click', function() { ui.semanaInicio = inicioDaSemana(new Date()); renderPlanner(); });
    $('#calPrev').addEventListener('click', function() { mudarMes(-1); });
    $('#calNext').addEventListener('click', function() { mudarMes(1); });

    $('#btnNovoPonto').addEventListener('click', function() { abrirPainelPonto(null); });
    $('#btnNovoEquipamento').addEventListener('click', function() { abrirPainelEquipamento(null); });
    $('#btnNovoHorario').addEventListener('click', function() { abrirPainelHorario(null); });
    $('#btnNovoPublicador').addEventListener('click', function() { abrirPainelPublicador(null); });

    $('#panelFechar').addEventListener('click', fecharPainel);
    $('#panelBackdrop').addEventListener('click', fecharPainel);
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape' && $('#panel').classList.contains('open')) fecharPainel();
    });

    carregarTudo().then(function() { irPara('planner'); });
  }

  function carregarTudo() {
    return rpc('getDadosAdmin').then(function(d) {
      state.pontos = d.pontos || [];
      state.horarios = d.horarios || [];
      state.equipamentos = d.equipamentos || [];
      state.equipamentoLocais = d.equipamentoLocais || [];
      state.publicadores = d.publicadores || [];
      state.feriados = d.feriados || [];
      atualizarVisaoAtual();
    }).catch(trataErro);
  }

  function atualizarVisaoAtual() {
    if (ui.view === 'planner') renderPlanner();
    else if (ui.view === 'calendario') renderCalendario();
    else if (ui.view === 'pontos') renderPontos();
    else if (ui.view === 'equipamentos') renderEquipamentos();
    else if (ui.view === 'horarios') renderHorarios();
    else if (ui.view === 'publicadores') renderPublicadores();
  }

  function publicadorById(id) {
    return state.publicadores.find(function(p) { return p.id === id; }) || null;
  }

  function irPara(view) {
    ui.view = view;
    $$('[data-view]').forEach(function(el) { el.classList.toggle('active', el.dataset.view === view); });
    $$('[data-page]').forEach(function(el) { el.hidden = el.dataset.page !== view; });
    $('#sidebar').classList.remove('open');
    atualizarVisaoAtual();
  }

  function copiarLinkPublico() {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(URL_PUBLICO).then(function() {
        tst('Link copiado: ' + URL_PUBLICO, 'success', 4500);
      }, function() { window.prompt('Copie o link:', URL_PUBLICO); });
    } else {
      window.prompt('Copie o link:', URL_PUBLICO);
    }
  }

  // ====== Painel lateral ======
  function abrirPainel(titulo, bodyHtml, foot) {
    $('#panelTitulo').textContent = titulo;
    $('#panelBody').innerHTML = bodyHtml;
    var foot$ = $('#panelFoot');
    if (foot) { foot$.hidden = false; foot$.innerHTML = foot; }
    else      { foot$.hidden = true;  foot$.innerHTML = ''; }
    $('#panel').classList.add('open');
    $('#panelBackdrop').classList.add('show');
  }
  function fecharPainel() {
    $('#panel').classList.remove('open');
    $('#panelBackdrop').classList.remove('show');
    if (ui.mapa) { try { ui.mapa.remove(); } catch (e) {} ui.mapa = null; ui.marcador = null; }
  }

  // ====== Helpers de domínio ======
  function pontoById(id)      { return state.pontos.find(function(p) { return p.id === id; }) || null; }
  function horarioById(id)    { return state.horarios.find(function(h) { return h.id === id; }) || null; }
  function equipamentoById(id){ return state.equipamentos.find(function(e) { return e.id === id; }) || null; }

  // ====== PLANNER ======
  function renderPlanner() {
    var ini = ui.semanaInicio;
    var fim = adicionarDias(ini, 6);
    $('#weekRange').textContent = fmtDataCurta(ini) + ' – ' + fmtDataCurta(fim) + '/' + fim.getFullYear();

    var mesIni = ini.getFullYear() + '-' + pad(ini.getMonth() + 1);
    var mesFim = fim.getFullYear() + '-' + pad(fim.getMonth() + 1);
    var p = mesIni === mesFim
      ? rpc('getAgendamentosDoMes', mesIni)
      : Promise.all([rpc('getAgendamentosDoMes', mesIni), rpc('getAgendamentosDoMes', mesFim)])
          .then(function(arr) { return arr[0].concat(arr[1]); });

    p.then(function(ags) {
      ui.agsSemana = ags;
      desenharPlanner(ini, ags);
    }).catch(trataErro);
  }

  function desenharPlanner(ini, ags) {
    destruirSortables();
    var hoje = ymdHoje();
    var pMap = {}, hMap = {}, eqMap = {};
    state.pontos.forEach(function(p) { pMap[p.id] = p; });
    state.horarios.forEach(function(h) { hMap[h.id] = h; });
    state.equipamentos.forEach(function(e) { eqMap[e.id] = e; });

    var inscritos = {};
    ags.forEach(function(a) {
      if (a.status === 'cancelado') return;
      var k = a.data + '|' + a.horarioId;
      if (!inscritos[k]) inscritos[k] = [];
      inscritos[k].push(a);
    });

    var horsPorDia = [[], [], [], [], [], [], []];
    state.horarios.filter(function(h) { return h.ativo; }).forEach(function(h) {
      var p = pMap[h.pontoId];
      if (!p || !p.ativo) return;
      horsPorDia[h.diaSemana].push(h);
    });
    horsPorDia.forEach(function(arr) {
      arr.sort(function(a, b) {
        return a.horaInicio.localeCompare(b.horaInicio) ||
               (pMap[a.pontoId].nome || '').localeCompare(pMap[b.pontoId].nome || '');
      });
    });

    var html = [];
    for (var i = 0; i < 7; i++) {
      var d = adicionarDias(ini, i);
      var dataYmd = ymd(d);
      var diaSem = d.getDay();
      var classes = ['day-col'];
      if (dataYmd === hoje) classes.push('hoje');
      var slotsHtml = horsPorDia[diaSem].map(function(h) {
        var p = pMap[h.pontoId];
        var k = dataYmd + '|' + h.id;
        var lista = inscritos[k] || [];
        var n = lista.length, cap = h.capacidade;
        var cls = n === 0 ? 'vazio' : (n > cap ? 'lotado' : (n >= cap ? 'cheio' : 'parcial'));

        var chips = lista.map(function(a) {
          var eqNome = a.equipamentoId && eqMap[a.equipamentoId] ? eqMap[a.equipamentoId].nome : '';
          var nomeChip = a.publicador.split(' ').slice(0, 2).join(' ');
          return (
            '<div class="pessoa-chip st-' + esc(a.status) + '" data-ag-id="' + esc(a.id) + '" tabindex="0">' +
              '<span class="nome">' + esc(nomeChip) + '</span>' +
              (eqNome ? '<span class="pessoa-equip">🛒 ' + esc(eqNome) + '</span>' : '') +
              '<div class="acoes">' +
                '<button data-act="abrir" title="Abrir detalhes"><i class="bi bi-three-dots"></i></button>' +
              '</div>' +
            '</div>'
          );
        }).join('');

        var podeAdicionar = n < cap;
        var addHtml = podeAdicionar
          ? '<div class="slot-add" data-add-h="' + esc(h.id) + '" data-add-data="' + esc(dataYmd) + '">' +
              '<i class="bi bi-plus-circle"></i>' +
              '<input type="text" list="dlPublicadores" placeholder="Adicionar irmão..." maxlength="120" autocomplete="off">' +
            '</div>'
          : '';

        return (
          '<div class="slot ' + cls + '" data-slot-h="' + esc(h.id) + '" data-slot-data="' + esc(dataYmd) + '">' +
            '<div class="slot-head" data-slot-open>' +
              '<div>' +
                '<div class="slot-titulo">' + esc(p.nome) + '</div>' +
                '<div class="slot-hora">' + esc(h.horaInicio.substring(0,5)) + '–' + esc(h.horaFim.substring(0,5)) + '</div>' +
              '</div>' +
              '<div class="slot-cap"><strong>' + n + '</strong>/' + cap + '</div>' +
            '</div>' +
            '<div class="slot-pessoas" data-pessoas="1">' + chips + '</div>' +
            addHtml +
          '</div>'
        );
      }).join('');

      if (!horsPorDia[diaSem].length) {
        slotsHtml = '<div style="color:var(--muted); font-size:.85rem; text-align:center; padding:18px 4px">sem horário</div>';
      }

      html.push(
        '<div class="' + classes.join(' ') + '">' +
          '<div class="day-head">' +
            '<span class="dia-nome">' + DIAS_CURTOS[diaSem] + '</span>' +
            '<span class="dia-num">' + fmtDataCurta(d) + '</span>' +
          '</div>' +
          '<div class="day-body">' + slotsHtml + '</div>' +
        '</div>'
      );
    }
    $('#plannerGrid').innerHTML = html.join('');
    renderDatalistPublicadores();
    instalarInteracoesPlanner();
  }

  function renderDatalistPublicadores() {
    var dl = document.getElementById('dlPublicadores');
    if (!dl) {
      dl = document.createElement('datalist');
      dl.id = 'dlPublicadores';
      document.body.appendChild(dl);
    }
    dl.innerHTML = state.publicadores
      .filter(function(p) { return p.ativo; })
      .map(function(p) { return '<option value="' + esc(p.nome) + '">'; })
      .join('');
  }

  function destruirSortables() {
    ui.sortables.forEach(function(s) { try { s.destroy(); } catch (e) {} });
    ui.sortables = [];
  }

  function instalarInteracoesPlanner() {
    // Click no head do slot abre painel detalhe
    $$('[data-slot-open]').forEach(function(el) {
      el.addEventListener('click', function() {
        var slot = el.closest('.slot');
        abrirPainelSlot(slot.dataset.slotH, slot.dataset.slotData);
      });
    });

    // Click no chip (qualquer parte exceto drag) abre detalhes
    $$('.pessoa-chip').forEach(function(chip) {
      chip.addEventListener('click', function(e) {
        if (e.target.closest('.acoes')) return; // botões do chip cuidam
        abrirPainelAgendamento(chip.dataset.agId);
      });
      var btnAbrir = chip.querySelector('[data-act="abrir"]');
      if (btnAbrir) btnAbrir.addEventListener('click', function(ev) {
        ev.stopPropagation();
        abrirPainelAgendamento(chip.dataset.agId);
      });
    });

    // Adicionar irmão inline
    $$('.slot-add').forEach(function(addEl) {
      var input = addEl.querySelector('input');
      input.addEventListener('focus', function() { addEl.classList.add('editando'); });
      input.addEventListener('blur', function() {
        if (!input.value.trim()) addEl.classList.remove('editando');
      });
      input.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
          e.preventDefault();
          var nome = input.value.trim();
          if (!nome) return;
          var horarioId = addEl.dataset.addH;
          var data = addEl.dataset.addData;
          input.disabled = true;
          rpc('adminAgendar', { horarioId: horarioId, data: data, publicador: nome })
            .then(function() {
              tst(nome + ' adicionado', 'success', 2000);
              renderPlanner();
            })
            .catch(function(err) {
              input.disabled = false;
              trataErro(err);
            });
        } else if (e.key === 'Escape') {
          input.value = '';
          input.blur();
        }
      });
    });

    // Drag & drop entre slots
    if (window.Sortable) {
      $$('[data-pessoas]').forEach(function(container) {
        var s = window.Sortable.create(container, {
          group: 'ags',
          animation: 180,
          ghostClass: 'dragging',
          onStart: function(evt) {
            // visual feedback opcional
          },
          onAdd: function(evt) {
            var chip = evt.item;
            var destinoSlot = container.closest('.slot');
            var agId = chip.dataset.agId;
            var novoHorarioId = destinoSlot.dataset.slotH;
            var novaData = destinoSlot.dataset.slotData;
            rpc('adminMoverAgendamento', { id: agId, novoHorarioId: novoHorarioId, novaData: novaData })
              .then(function() {
                tst('Agendamento movido', 'success', 2000);
                renderPlanner();
              })
              .catch(function(err) {
                trataErro(err);
                renderPlanner(); // restaura estado correto
              });
          }
        });
        ui.sortables.push(s);
      });
    }
  }

  // ====== Painel: detalhe do slot ======
  function abrirPainelSlot(horarioId, dataYmd) {
    var h = horarioById(horarioId);
    if (!h) return;
    var p = pontoById(h.pontoId);
    var ags = ui.agsSemana.filter(function(a) {
      return a.horarioId === horarioId && a.data === dataYmd && a.status !== 'cancelado';
    });
    var corpo = [
      '<div style="margin-bottom:16px">' +
        '<div style="font-size:1.1rem;font-weight:600">' + esc(p ? p.nome : '?') + '</div>' +
        '<div style="color:var(--muted)">' + DIAS[h.diaSemana] + ' · ' + esc(h.horaInicio) + ' – ' + esc(h.horaFim) +
        ' · ' + esc(dataYmd) + '</div>' +
        '<div style="margin-top:6px"><span class="pill ' +
          (ags.length >= h.capacidade ? 'ok' : (ags.length > 0 ? 'warn' : 'muted')) + '">' +
          ags.length + '/' + h.capacidade + ' inscritos</span></div>' +
      '</div>'
    ];

    if (!ags.length) {
      corpo.push('<div class="empty">Ninguém ainda. Adicione direto no slot do planner.</div>');
    } else {
      corpo.push('<div class="card" style="padding:8px">');
      ags.forEach(function(a) {
        corpo.push(
          '<div style="padding:10px 8px;border-bottom:1px solid var(--border)">' +
            '<div style="font-weight:600">' + esc(a.publicador) + '</div>' +
            '<div style="color:var(--muted);font-size:.85rem;margin:2px 0 6px">' +
              '<span class="pill ' + statusPill(a.status) + '">' + esc(a.status) + '</span>' +
            '</div>' +
            '<button class="btn btn-xs" data-abrir-ag="' + esc(a.id) + '">Detalhes / ações</button>' +
          '</div>'
        );
      });
      corpo.push('</div>');
    }
    abrirPainel('Slot · ' + (p ? p.nome : ''), corpo.join(''));
    $$('#panelBody [data-abrir-ag]').forEach(function(b) {
      b.addEventListener('click', function() { abrirPainelAgendamento(b.dataset.abrirAg); });
    });
  }

  function statusPill(st) {
    return st === 'concluido' ? 'muted'
         : st === 'presente'  ? 'ok'
         : st === 'agendado'  ? 'accent'
         : st === 'ausente'   ? 'warn'
         : st === 'cancelado' ? 'bad' : 'muted';
  }

  // ====== Painel: detalhe do agendamento (ações) ======
  function abrirPainelAgendamento(agId) {
    var a = ui.agsSemana.find(function(x) { return x.id === agId; });
    if (!a) { tst('Agendamento não encontrado nesta semana', 'warn'); return; }
    var h = horarioById(a.horarioId);
    var p = h ? pontoById(h.pontoId) : null;
    var eqAtual = a.equipamentoId ? equipamentoById(a.equipamentoId) : null;
    var eqOpts = ['<option value="">— Sem equipamento —</option>'];
    state.equipamentos.filter(function(e) { return e.ativo; }).forEach(function(e) {
      eqOpts.push('<option value="' + esc(e.id) + '"' +
        (a.equipamentoId === e.id ? ' selected' : '') + '>' +
        esc(e.nome) + ' (' + esc(e.tipo) + ')</option>');
    });

    var corpo = (
      '<div style="margin-bottom:18px">' +
        '<div style="font-size:1.2rem;font-weight:600">' + esc(a.publicador) + '</div>' +
        '<div style="color:var(--muted)">' + (p ? esc(p.nome) : '?') + ' · ' +
        (h ? esc(h.horaInicio) + '–' + esc(h.horaFim) : '') + ' · ' + esc(a.data) + '</div>' +
        '<div style="margin-top:8px"><span class="pill ' + statusPill(a.status) + '">' + esc(a.status) + '</span></div>' +
        (a.checkIn ? '<div style="margin-top:8px;color:var(--ok);font-size:.85rem">✓ Entrada: ' + esc(a.checkIn) + '</div>' : '') +
        (a.checkOut ? '<div style="color:var(--muted);font-size:.85rem">✓ Saída: ' + esc(a.checkOut) + '</div>' : '') +
      '</div>' +
      '<div class="field" style="margin-bottom:14px"><label>Carrinho/Display</label>' +
        '<select class="select" id="agEq">' + eqOpts.join('') + '</select></div>' +
      '<div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px">' +
        (a.status === 'agendado' ? '<button class="btn btn-sm" data-ac="checkin"><i class="bi bi-box-arrow-in-right"></i> Check-in</button>' : '') +
        (a.status === 'presente' ? '<button class="btn btn-sm btn-primary" data-ac="checkout"><i class="bi bi-box-arrow-right"></i> Check-out</button>' : '') +
        (a.status === 'agendado' ? '<button class="btn btn-sm" data-ac="ausente"><i class="bi bi-person-x"></i> Marcar ausente</button>' : '') +
        (a.status !== 'cancelado' && a.status !== 'concluido' ? '<button class="btn btn-sm btn-danger" data-ac="cancelar"><i class="bi bi-x-circle"></i> Cancelar</button>' : '') +
      '</div>'
    );
    abrirPainel('Detalhes', corpo);

    $('#agEq').addEventListener('change', function() {
      rpc('adminTrocarEquipamento', a.id, $('#agEq').value)
        .then(function() { tst('Carrinho atualizado', 'success', 2000); renderPlanner(); })
        .catch(function(err) { trataErro(err); $('#agEq').value = a.equipamentoId || ''; });
    });
    $$('#panelBody [data-ac]').forEach(function(b) {
      b.addEventListener('click', function() {
        var act = b.dataset.ac;
        if (act === 'checkin') {
          rpc('adminCheckIn', a.id).then(function() { tst('Check-in feito', 'success'); fecharPainel(); renderPlanner(); }).catch(trataErro);
        } else if (act === 'checkout') {
          abrirPainelCheckout(a.id);
        } else if (act === 'ausente') {
          if (!confirm('Marcar ' + a.publicador + ' como ausente?')) return;
          rpc('adminMarcarAusente', a.id).then(function() { tst('Marcado ausente', 'info'); fecharPainel(); renderPlanner(); }).catch(trataErro);
        } else if (act === 'cancelar') {
          if (!confirm('Cancelar agendamento de ' + a.publicador + '?')) return;
          rpc('adminCancelar', a.id).then(function() { tst('Cancelado', 'info'); fecharPainel(); renderPlanner(); }).catch(trataErro);
        }
      });
    });
  }

  function abrirPainelCheckout(agId) {
    var body = (
      '<form onsubmit="return false">' +
        '<div class="field" style="margin-bottom:12px"><label>Estado das rodas</label>' +
          '<select class="select" id="coRodas">' +
            '<option value="">—</option><option value="ok">OK</option><option value="atencao">Atenção</option><option value="problema">Problema</option>' +
          '</select></div>' +
        '<div class="field" style="margin-bottom:12px"><label>Estado do display</label>' +
          '<select class="select" id="coDisplay">' +
            '<option value="">—</option><option value="ok">OK</option><option value="atencao">Atenção</option><option value="problema">Problema</option>' +
          '</select></div>' +
        '<div class="field" style="margin-bottom:12px"><label>Estoque de publicações restante</label>' +
          '<input class="input" type="number" id="coEstoque" min="0" max="9999" placeholder="Quantas sobraram"></div>' +
        '<div class="field"><label>Notas</label>' +
          '<textarea class="textarea" id="coNotas" rows="3" maxlength="500"></textarea></div>' +
      '</form>'
    );
    var foot = '<button class="btn" id="coCancelar">Voltar</button>' +
               '<button class="btn btn-primary" id="coSalvar">Finalizar turno</button>';
    abrirPainel('Check-out', body, foot);
    $('#coCancelar').addEventListener('click', function() { abrirPainelAgendamento(agId); });
    $('#coSalvar').addEventListener('click', function() {
      var est = {
        estadoRodas: $('#coRodas').value,
        estadoDisplay: $('#coDisplay').value,
        estoquePubs: $('#coEstoque').value === '' ? '' : Number($('#coEstoque').value),

  function montarMapaPonto() {
    var lat = parseFloat($('#pLat').value);
    var lng = parseFloat($('#pLng').value);
    var centro = (isFinite(lat) && isFinite(lng)) ? [lat, lng] : [-15.78, -47.93];
    ui.mapa = L.map('pMapa').setView(centro, isFinite(lat) ? 16 : 5);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19, attribution: '© OpenStreetMap' }).addTo(ui.mapa);
    if (isFinite(lat) && isFinite(lng)) colocarPin(lat, lng, false);
    ui.mapa.on('click', function(e) { colocarPin(e.latlng.lat, e.latlng.lng, true); });
    setTimeout(function() { if (ui.mapa) ui.mapa.invalidateSize(); }, 60);
  }
  function colocarPin(lat, lng, atualizaInputs) {
    if (atualizaInputs) {
      $('#pLat').value = Number(lat).toFixed(6);
      $('#pLng').value = Number(lng).toFixed(6);
    }
    if (ui.marcador) ui.marcador.setLatLng([lat, lng]);
    else {
      ui.marcador = L.marker([lat, lng], { draggable: true }).addTo(ui.mapa);
      ui.marcador.on('dragend', function(e) {
        var ll = e.target.getLatLng();
        $('#pLat').value = ll.lat.toFixed(6);
        $('#pLng').value = ll.lng.toFixed(6);
      });
    }
  }
  function sincMapaInputs() {
    var lat = parseFloat($('#pLat').value);
    var lng = parseFloat($('#pLng').value);
    if (isFinite(lat) && isFinite(lng) && ui.mapa) {
      colocarPin(lat, lng, false);
      ui.mapa.setView([lat, lng], 16);
    }
  }

  function mudarMes(delta) {
    var p = ui.mesAtual.split('-');
    var d = new Date(Number(p[0]), Number(p[1]) - 1 + delta, 1);
    ui.mesAtual = d.getFullYear() + '-' + pad(d.getMonth() + 1);
    renderCalendario();
  }
  function renderCalendario() {
    var p = ui.mesAtual.split('-');
    var ano = Number(p[0]), mes0 = Number(p[1]) - 1;
    $('#calTitulo').textContent = MESES[mes0] + ' / ' + ano;
    rpc('getAgendamentosDoMes', ui.mesAtual).then(function(ags) {
      desenharCalendario(ano, mes0, ags);
    }).catch(trataErro);
  }
  function desenharCalendario(ano, mes0, ags) {
    var html = DIAS_CURTOS.map(function(d) { return '<div class="cal-head">' + d + '</div>'; });
    var primeiro = new Date(ano, mes0, 1);
    var ult = new Date(ano, mes0 + 1, 0).getDate();
    var hoje = ymdHoje();
    var horsPorDia = [[], [], [], [], [], [], []];
    state.horarios.filter(function(h) { return h.ativo; }).forEach(function(h) { horsPorDia[h.diaSemana].push(h); });
    var pMap = {}; state.pontos.forEach(function(p) { pMap[p.id] = p; });
    var ocup = {};
    ags.forEach(function(a) {
      if (a.status === 'cancelado') return;
      var k = a.data + '|' + a.horarioId;
      ocup[k] = (ocup[k] || 0) + 1;
    });
    var prevUlt = new Date(ano, mes0, 0).getDate();
    for (var i = primeiro.getDay() - 1; i >= 0; i--) {
      html.push('<div class="cal-cell outro"><div class="dia-num">' + (prevUlt - i) + '</div></div>');
    }
    for (var dia = 1; dia <= ult; dia++) {
      var d = new Date(ano, mes0, dia);
      var dataYmd = ano + '-' + pad(mes0 + 1) + '-' + pad(dia);
      var classes = ['cal-cell'];
      if (dataYmd === hoje) classes.push('hoje');
      var hors = horsPorDia[d.getDay()];
      var slots = hors.slice(0, 4).map(function(h) {
        var p = pMap[h.pontoId];
        if (!p || !p.ativo) return '';
        var n = ocup[dataYmd + '|' + h.id] || 0;
        var cls = n === 0 ? 'vazio' : (n > h.capacidade ? 'lotado' : (n >= h.capacidade ? 'cheio' : 'parcial'));
        return '<div class="cal-slot ' + cls + '" title="' + esc(p.nome) + ' ' + esc(h.horaInicio) + '">' +
                 esc(h.horaInicio.substring(0,5)) + ' ' + esc(p.nome.substring(0,8)) + '</div>';
      }).filter(Boolean).join('');
      var extra = hors.length > 4 ? '<div style="color:var(--muted);font-size:.7rem">+' + (hors.length - 4) + '</div>' : '';
      html.push('<div class="' + classes.join(' ') + '"><div class="dia-num">' + dia + '</div>' + slots + extra + '</div>');
    }
    var resto = (7 - ((primeiro.getDay() + ult) % 7)) % 7;
    for (var k = 1; k <= resto; k++) html.push('<div class="cal-cell outro"><div class="dia-num">' + k + '</div></div>');
    $('#calGrid').innerHTML = html.join('');
  }
})();
</script>
