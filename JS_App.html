<script>
(function() {
  'use strict';

  // ====== Estado ======
  var state = {
    pontos: [], equipamentos: [], equipamentoLocais: [], publicadores: []
  };
  var ui = {
    view: 'planner',
    semanaInicio: inicioDaSemana(new Date()),
    equipamentoId: null,
    eventos: [],
    mapa: null, marcador: null
  };

  var HORA_INICIAL = 6;   // 6h
  var HORA_FINAL   = 22;  // 22h
  var SLOT_MIN     = 30;  // 30min por slot
  var PX_POR_SLOT  = 24;  // bate com --slot-h
  var DIAS = ['Domingo', 'Segunda', 'Terça', 'Quarta', 'Quinta', 'Sexta', 'Sábado'];
  var DIAS_CURTOS = ['DOM', 'SEG', 'TER', 'QUA', 'QUI', 'SEX', 'SÁB'];

  // ====== Utils ======
  function $(s, root) { return (root || document).querySelector(s); }
  function $$(s, root) { return Array.prototype.slice.call((root || document).querySelectorAll(s)); }
  function esc(s) {
    if (s === null || s === undefined) return '';
    return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }
  function tst(m, t, d) { if (window.toast) window.toast(m, t, d); }
  function pad(n) { return String(n).padStart(2, '0'); }
  function ymd(d) { return d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate()); }
  function ymdHoje() { return ymd(new Date()); }
  function inicioDaSemana(d) {
    var x = new Date(d.getFullYear(), d.getMonth(), d.getDate());
    x.setDate(x.getDate() - x.getDay());
    return x;
  }
  function adicionarDias(d, n) {
    var x = new Date(d.getFullYear(), d.getMonth(), d.getDate());
    x.setDate(x.getDate() + n);
    return x;
  }
  function ymdParaDate(s) {
    var p = s.split('-');
    return new Date(Number(p[0]), Number(p[1]) - 1, Number(p[2]));
  }
  function fmtBR(d) { return pad(d.getDate()) + '/' + pad(d.getMonth() + 1); }
  function minHora(hhmm) { var p = hhmm.split(':'); return Number(p[0]) * 60 + Number(p[1]); }
  function snap30(min) { return Math.round(min / 30) * 30; }
  function minParaHhmm(m) { return pad(Math.floor(m / 60)) + ':' + pad(m % 60); }

  function rpc(nome) {
    var args = Array.prototype.slice.call(arguments, 1);
    return new Promise(function(resolve, reject) {
      google.script.run.withSuccessHandler(resolve).withFailureHandler(reject)[nome].apply(null, args);
    });
  }
  function trataErro(err) {
    var msg = (err && err.message) ? err.message : String(err);
    tst(msg, 'error', 5000);
    console.error(err);
  }

  // ====== Boot ======
  document.addEventListener('DOMContentLoaded', boot);
  function boot() {
    $$('[data-view]').forEach(function(el) {
      el.addEventListener('click', function() { irPara(el.dataset.view); });
    });
    $('#btnMenu').addEventListener('click', function() { $('#sidebar').classList.toggle('open'); });
    $('#btnLinkPublico').addEventListener('click', copiarLinkPublico);
    $('#btnRecarregar').addEventListener('click', function() {
      rpc('limparCacheServidor').then(carregarTudo);
    });

    $('#weekPrev').addEventListener('click', function() { ui.semanaInicio = adicionarDias(ui.semanaInicio, -7); renderAgendaEq(); });
    $('#weekNext').addEventListener('click', function() { ui.semanaInicio = adicionarDias(ui.semanaInicio, 7); renderAgendaEq(); });
    $('#weekToday').addEventListener('click', function() { ui.semanaInicio = inicioDaSemana(new Date()); renderAgendaEq(); });
    $('#weekPrevGeral').addEventListener('click', function() { ui.semanaInicio = adicionarDias(ui.semanaInicio, -7); renderAgendaGeral(); });
    $('#weekNextGeral').addEventListener('click', function() { ui.semanaInicio = adicionarDias(ui.semanaInicio, 7); renderAgendaGeral(); });
    $('#weekTodayGeral').addEventListener('click', function() { ui.semanaInicio = inicioDaSemana(new Date()); renderAgendaGeral(); });

    $('#selEq').addEventListener('change', function() {
      ui.equipamentoId = $('#selEq').value;
      renderAgendaEq();
    });

    $('#btnNovoEventoSemEq').addEventListener('click', function() { abrirPainelEvento(null, { equipamentoId: ui.equipamentoId }); });
    $('#btnNovoEventoGeral').addEventListener('click', function() { abrirPainelEvento(null, {}); });
    $('#btnNovoPublicador').addEventListener('click', function() { abrirPainelPublicador(null); });
    $('#btnNovoPonto').addEventListener('click', function() { abrirPainelPonto(null); });
    $('#btnNovoEquipamento').addEventListener('click', function() { abrirPainelEquipamento(null); });

    $('#panelFechar').addEventListener('click', fecharPainel);
    $('#panelBackdrop').addEventListener('click', fecharPainel);
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape' && $('#panel').classList.contains('open')) fecharPainel();
    });

    carregarTudo().then(function() { irPara('planner'); });
  }

  function carregarTudo() {
    return rpc('getDadosAdmin').then(function(d) {
      state.pontos = d.pontos || [];
      state.equipamentos = d.equipamentos || [];
      state.equipamentoLocais = d.equipamentoLocais || [];
      state.publicadores = d.publicadores || [];
      preencherSelectEq();
      atualizarVisaoAtual();
    }).catch(trataErro);
  }

  function preencherSelectEq() {
    var sel = $('#selEq');
    var ativos = state.equipamentos.filter(function(e) { return e.ativo; });
    if (!ativos.length) {
      sel.innerHTML = '<option value="">— Cadastre um equipamento primeiro —</option>';
      ui.equipamentoId = null;
      return;
    }
    sel.innerHTML = ativos.map(function(e) {
      return '<option value="' + esc(e.id) + '">' + esc(e.nome) + ' (' + esc(e.tipo) + ')</option>';
    }).join('');
    if (!ui.equipamentoId || !ativos.find(function(e) { return e.id === ui.equipamentoId; })) {
      ui.equipamentoId = ativos[0].id;
    }
    sel.value = ui.equipamentoId;
  }

  function atualizarVisaoAtual() {
    if (ui.view === 'planner')      renderAgendaEq();
    else if (ui.view === 'geral')   renderAgendaGeral();
    else if (ui.view === 'publicadores') renderPublicadores();
    else if (ui.view === 'pontos')  renderPontos();
    else if (ui.view === 'equipamentos') renderEquipamentos();
  }

  function irPara(view) {
    ui.view = view;
    $$('[data-view]').forEach(function(el) { el.classList.toggle('active', el.dataset.view === view); });
    $$('[data-page]').forEach(function(el) { el.hidden = el.dataset.page !== view; });
    $('#sidebar').classList.remove('open');
    atualizarVisaoAtual();
  }

  function copiarLinkPublico() {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(URL_PUBLICO).then(function() {
        tst('Link copiado: ' + URL_PUBLICO, 'success', 4500);
      }, function() { window.prompt('Copie o link:', URL_PUBLICO); });
    } else { window.prompt('Copie o link:', URL_PUBLICO); }
  }

  // ====== Painel ======
  function abrirPainel(titulo, bodyHtml, foot) {
    $('#panelTitulo').textContent = titulo;
    $('#panelBody').innerHTML = bodyHtml;
    var foot$ = $('#panelFoot');
    if (foot) { foot$.hidden = false; foot$.innerHTML = foot; }
    else      { foot$.hidden = true;  foot$.innerHTML = ''; }
    $('#panel').classList.add('open');
    $('#panelBackdrop').classList.add('show');
  }
  function fecharPainel() {
    $('#panel').classList.remove('open');
    $('#panelBackdrop').classList.remove('show');
    if (ui.mapa) { try { ui.mapa.remove(); } catch (e) {} ui.mapa = null; ui.marcador = null; }
  }

  function equipamentoById(id) { return state.equipamentos.find(function(e) { return e.id === id; }) || null; }
  function pontoById(id)       { return state.pontos.find(function(p) { return p.id === id; }) || null; }
  function publicadorById(id)  { return state.publicadores.find(function(p) { return p.id === id; }) || null; }

  // ============ AGENDA ============
  function renderRangeLabel(elIni, elFim) {
    var ini = ui.semanaInicio, fim = adicionarDias(ini, 6);
    var s = fmtBR(ini) + ' – ' + fmtBR(fim) + '/' + fim.getFullYear();
    $('#weekRange').textContent = s;
    $('#weekRangeGeral').textContent = s;
  }

  function renderAgendaEq() {
    renderRangeLabel();
    if (!ui.equipamentoId) {
      $('#agendaEq').innerHTML = '<div class="empty">Cadastre um equipamento primeiro pra ver a agenda.</div>';
      return;
    }
    var ini = ymd(ui.semanaInicio);
    var fim = ymd(adicionarDias(ui.semanaInicio, 6));
    rpc('listarEventos', { equipamentoId: ui.equipamentoId, inicio: ini, fim: fim }).then(function(evs) {
      ui.eventos = evs;
      desenharAgenda($('#agendaEq'), evs, /*colorPorEquipamento=*/false);
    }).catch(trataErro);
  }

  function renderAgendaGeral() {
    renderRangeLabel();
    var ini = ymd(ui.semanaInicio);
    var fim = ymd(adicionarDias(ui.semanaInicio, 6));
    rpc('listarEventos', { inicio: ini, fim: fim }).then(function(evs) {
      ui.eventos = evs;
      desenharAgenda($('#agendaGeral'), evs, /*colorPorEquipamento=*/true);
      renderLegenda();
    }).catch(trataErro);
  }

  function renderLegenda() {
    var ativos = state.equipamentos.filter(function(e) { return e.ativo; });
    $('#legendaEq').innerHTML = ativos.map(function(e) {
      return '<span class="item"><span class="sw" style="background:' + esc(e.cor) + '"></span>' + esc(e.nome) + '</span>';
    }).join('');
  }

  function desenharAgenda(container, eventos, corPorEq) {
    var hoje = ymdHoje();
    var html = [];

    // Header
    html.push('<div class="agenda">');
    html.push('<div class="agenda-head">');
    html.push('<div class="col-h"></div>');
    for (var i = 0; i < 7; i++) {
      var d = adicionarDias(ui.semanaInicio, i);
      var dYmd = ymd(d);
      var cls = 'col-d' + (dYmd === hoje ? ' hoje' : '');
      html.push('<div class="' + cls + '">' +
        '<div class="dia-nome">' + DIAS_CURTOS[d.getDay()] + '</div>' +
        '<div class="dia-num">' + fmtBR(d) + '</div>' +
      '</div>');
    }
    html.push('</div>'); // /head

    // Body: coluna horas + 7 colunas de dia
    html.push('<div class="agenda-body">');
    html.push('<div class="col-horas">');
    for (var h = HORA_INICIAL; h < HORA_FINAL; h++) {
      html.push('<div class="marca">' + pad(h) + ':00</div>');
    }
    html.push('</div>');

    // index eventos por dia
    var evsPorDia = {};
    eventos.forEach(function(ev) {
      if (!evsPorDia[ev.data]) evsPorDia[ev.data] = [];
      evsPorDia[ev.data].push(ev);
    });

    var totalSlots = (HORA_FINAL - HORA_INICIAL) * 2;
    var alturaTotal = totalSlots * PX_POR_SLOT;

    for (var j = 0; j < 7; j++) {
      var dia = adicionarDias(ui.semanaInicio, j);
      var diaYmd = ymd(dia);
      html.push('<div class="col-dia' + (diaYmd === hoje ? ' hoje' : '') +
        '" data-data="' + esc(diaYmd) + '" style="height:' + alturaTotal + 'px">');

      // Eventos posicionados
      var ehs = evsPorDia[diaYmd] || [];
      var posicionados = posicionarEventos(ehs);
      posicionados.forEach(function(p) {
        var ev = p.evento;
        var topMin = minHora(ev.horaInicio) - HORA_INICIAL * 60;
        var durMin = minHora(ev.horaFim) - minHora(ev.horaInicio);
        if (topMin < 0) topMin = 0;
        var top = (topMin / SLOT_MIN) * PX_POR_SLOT;
        var height = Math.max(16, (durMin / SLOT_MIN) * PX_POR_SLOT - 2);
        var eq = equipamentoById(ev.equipamentoId);
        var cor = (corPorEq && eq) ? eq.cor : (eq ? eq.cor : '#2563eb');
        var widthPct = 100 / p.totalCols;
        var leftPct = p.col * widthPct;
        var ponto = ev.pontoId ? (pontoById(ev.pontoId) || {}).nome : ev.pontoAvulso;
        var pubs = (ev.publicadores || []).map(function(x) { return (x.nome || '').split(' ')[0]; }).join(', ');
        html.push(
          '<div class="evento ' + esc(ev.status) + '" data-ev="' + esc(ev.id) + '"' +
            ' style="top:' + top + 'px;height:' + height + 'px;' +
            'left:calc(' + leftPct + '% + 2px); width:calc(' + widthPct + '% - 4px);' +
            'background:' + esc(cor) + ';">' +
            '<div class="ev-titulo">' + esc(ponto || '?') + '</div>' +
            (height > 32
              ? '<div class="ev-meta">' + esc(ev.horaInicio.substring(0,5)) + '–' + esc(ev.horaFim.substring(0,5)) +
                (eq && corPorEq ? ' · ' + esc(eq.nome) : '') + '</div>'
              : '') +
            (height > 50 && pubs ? '<div class="ev-pubs">' + esc(pubs) + '</div>' : '') +
          '</div>'
        );
      });

      // Ghost-click pra criar evento (fica atrás dos eventos)
      html.push('<div class="ghost-click"></div>');
      html.push('</div>');
    }

    html.push('</div></div>'); // /body /agenda

    container.innerHTML = html.join('');

    // Click handlers
    $$('.evento', container).forEach(function(el) {
      el.addEventListener('click', function(e) {
        e.stopPropagation();
        abrirPainelEvento(el.dataset.ev);
      });
    });
    $$('.ghost-click', container).forEach(function(el) {
      el.addEventListener('click', function(e) {
        var col = el.parentElement;
        var rect = col.getBoundingClientRect();
        var y = e.clientY - rect.top;
        var min = HORA_INICIAL * 60 + snap30((y / PX_POR_SLOT) * SLOT_MIN);
        if (min < HORA_INICIAL * 60) min = HORA_INICIAL * 60;
        if (min > HORA_FINAL * 60 - 60) min = HORA_FINAL * 60 - 60;
        abrirPainelEvento(null, {
          equipamentoId: ui.view === 'planner' ? ui.equipamentoId : '',
          data: col.dataset.data,
          horaInicio: minParaHhmm(min),
          horaFim: minParaHhmm(min + 60)
        });
      });
    });
  }

  // Atribui colunas pra evitar overlap visual.
  function posicionarEventos(eventos) {
    var ord = eventos.slice().sort(function(a, b) {
      return a.horaInicio.localeCompare(b.horaInicio) || a.horaFim.localeCompare(b.horaFim);
    });
    var clusters = [];
    var cluster = [];
    ord.forEach(function(ev) {
      var sobrepoe = cluster.some(function(o) {
        return ev.horaInicio < o.evento.horaFim && o.evento.horaInicio < ev.horaFim;
      });
      if (!sobrepoe && cluster.length) { clusters.push(cluster); cluster = []; }
      cluster.push({ evento: ev });
    });
    if (cluster.length) clusters.push(cluster);
    var resultado = [];
    clusters.forEach(function(c) {
      // dentro do cluster, atribui colunas greedy
      var cols = []; // cols[i] = {fim: hh:mm} do último evento na coluna
      c.forEach(function(item) {
        var ev = item.evento;
        var idx = -1;
        for (var i = 0; i < cols.length; i++) {
          if (cols[i].fim <= ev.horaInicio) { idx = i; break; }
        }
        if (idx === -1) { idx = cols.length; cols.push({ fim: ev.horaFim }); }
        else { cols[idx].fim = ev.horaFim; }
        item.col = idx;
      });
      var total = cols.length;
      c.forEach(function(item) {
        resultado.push({ evento: item.evento, col: item.col, totalCols: total });
      });
    });
    return resultado;
  }

  // ====== Painel: Evento (criar/editar) ======
  function abrirPainelEvento(id, preset) {
    var ev = id ? ui.eventos.find(function(e) { return e.id === id; }) : null;
    preset = preset || {};
    var p = ev || {
      equipamentoId: preset.equipamentoId || '',
      pontoId: '', pontoAvulso: '',
      data: preset.data || ymdHoje(),
      horaInicio: preset.horaInicio || '08:00',
      horaFim: preset.horaFim || '10:00',
      publicadores: [], notas: '',
      recorrenciaTipo: 'none', recorrenciaFim: '',
      status: 'planejado'
    };

    var optEq = state.equipamentos
      .filter(function(e) { return e.ativo || e.id === p.equipamentoId; })
      .map(function(e) {
        return '<option value="' + esc(e.id) + '"' + (p.equipamentoId === e.id ? ' selected' : '') + '>' +
                 esc(e.nome) + ' (' + esc(e.tipo) + ')</option>';
      }).join('');
    var optPonto = ['<option value="">— Local avulso —</option>']
      .concat(state.pontos.filter(function(p) { return p.ativo; })
        .map(function(pt) {
          return '<option value="' + esc(pt.id) + '"' + (p.pontoId === pt.id ? ' selected' : '') + '>' + esc(pt.nome) + '</option>';
        })).join('');

    var pubsAtuaisHtml = (p.publicadores || []).map(function(x) {
      return '<span class="pub-chip" data-pub-chip="' + esc(x.id) + '">' +
               esc(x.nome) +
               (ev ? '<button data-rm="' + esc(x.id) + '" title="Remover"><i class="bi bi-x"></i></button>' : '') +
             '</span>';
    }).join('');
    var pubsDispo = state.publicadores.filter(function(pub) {
      return pub.ativo && !(p.publicadores || []).some(function(x) { return x.id === pub.id; });
    });
    var optPubAdd = ['<option value="">+ Adicionar publicador…</option>']
      .concat(pubsDispo.map(function(pub) {
        return '<option value="' + esc(pub.id) + '">' + esc(pub.nome) + '</option>';
      })).join('');

    var recOpts = [
      ['none',     'Não repete'],
      ['daily',    'Diário'],
      ['weekly',   'Toda semana'],
      ['biweekly', 'A cada 2 semanas'],
      ['monthly',  'Mensal (mesmo dia da semana)']
    ].map(function(o) {
      return '<option value="' + o[0] + '"' + (p.recorrenciaTipo === o[0] ? ' selected' : '') + '>' + o[1] + '</option>';
    }).join('');

    var body = (
      '<form onsubmit="return false">' +
        '<div class="field" style="margin-bottom:12px"><label>Equipamento *</label>' +
          '<select class="select" id="evEq">' + (optEq || '<option value="">— sem equipamentos —</option>') + '</select></div>' +
        '<div class="field" style="margin-bottom:12px"><label>Local</label>' +
          '<select class="select" id="evPonto">' + optPonto + '</select></div>' +
        '<div class="field" style="margin-bottom:12px"><label>Local avulso (se não escolheu acima)</label>' +
          '<input class="input" id="evPontoAv" maxlength="240" placeholder="Ex: Praça temporária" value="' + esc(p.pontoAvulso || '') + '"></div>' +
        '<div class="field" style="margin-bottom:12px"><label>Data *</label>' +
          '<input class="input" type="date" id="evData" value="' + esc(p.data) + '"></div>' +
        '<div style="display:flex;gap:10px;margin-bottom:12px">' +
          '<div class="field" style="flex:1"><label>Início</label>' +
            '<input class="input" type="time" id="evIni" value="' + esc(p.horaInicio.substring(0,5)) + '"></div>' +
          '<div class="field" style="flex:1"><label>Fim</label>' +
            '<input class="input" type="time" id="evFim" value="' + esc(p.horaFim.substring(0,5)) + '"></div>' +
        '</div>' +
        '<div class="field" style="margin-bottom:8px"><label>Publicadores</label>' +
          '<div class="pubs-stack" id="evPubs">' + (pubsAtuaisHtml || '<span style="color:var(--muted);font-size:.85rem">Nenhum ainda</span>') + '</div>' +
        '</div>' +
        '<div class="field" style="margin-bottom:14px">' +
          '<select class="select" id="evPubAdd">' + optPubAdd + '</select>' +
        '</div>' +
        (ev ? '' : (
          '<div style="display:flex;gap:10px;margin-bottom:12px">' +
            '<div class="field" style="flex:1"><label>Repetir</label>' +
              '<select class="select" id="evRec">' + recOpts + '</select></div>' +
            '<div class="field" style="flex:1"><label>Até (opcional)</label>' +
              '<input class="input" type="date" id="evRecFim" value="' + esc(p.recorrenciaFim || '') + '"></div>' +
          '</div>'
        )) +
        '<div class="field" style="margin-bottom:12px"><label>Notas</label>' +
          '<textarea class="textarea" id="evNotas" rows="2" maxlength="500">' + esc(p.notas) + '</textarea></div>' +
        (ev && ev.status === 'concluido' ? (
          '<div class="card" style="margin-top:10px"><div style="font-weight:600;margin-bottom:6px">Estado registrado no check-out</div>' +
            (ev.estadoRodas ? '<div>Rodas: <b>' + esc(ev.estadoRodas) + '</b></div>' : '') +
            (ev.estadoDisplay ? '<div>Display: <b>' + esc(ev.estadoDisplay) + '</b></div>' : '') +
            (ev.estoquePubs !== null ? '<div>Estoque: <b>' + ev.estoquePubs + '</b></div>' : '') +
            (ev.notasEstado ? '<div>Notas: <i>' + esc(ev.notasEstado) + '</i></div>' : '') +
          '</div>'
        ) : '') +
      '</form>'
    );

    var foot = (
      (ev ? '<button class="btn btn-danger danger" id="evExcluir"><i class="bi bi-trash"></i> Excluir</button>' : '') +
      '<button class="btn" id="evCancelar">Cancelar</button>' +
      (ev && ev.status !== 'concluido' ? '<button class="btn" id="evConcluir">Concluir</button>' : '') +
      '<button class="btn btn-primary" id="evSalvar">' + (ev ? 'Salvar' : 'Criar') + '</button>'
    );
    abrirPainel(ev ? 'Editar evento' : 'Novo evento', body, foot);

    // Add publicador via select
    $('#evPubAdd').addEventListener('change', function() {
      var idPub = $('#evPubAdd').value;
      if (!idPub) return;
      var pub = publicadorById(idPub);
      if (!pub) return;
      if (ev) {
        rpc('adicionarPublicadorAoEvento', ev.id, idPub).then(function() {
          tst(pub.nome + ' adicionado', 'success', 2000);
          atualizarVisaoAtual();
          // re-abre o painel pra refletir
          fecharPainel();
        }).catch(trataErro);
      } else {
        p.publicadores = (p.publicadores || []).concat({ id: pub.id, nome: pub.nome });
        // re-renderiza só essa parte
        var stack = $('#evPubs');
        stack.innerHTML = p.publicadores.map(function(x) {
          return '<span class="pub-chip">' + esc(x.nome) + '</span>';
        }).join('');
        // remove do dropdown
        var optEl = $('#evPubAdd option[value="' + idPub + '"]');
        if (optEl) optEl.remove();
        $('#evPubAdd').value = '';
      }
    });

    // Remove pub no editar
    $$('#evPubs [data-rm]').forEach(function(b) {
      b.addEventListener('click', function() {
        if (!ev) return;
        var idPub = b.dataset.rm;
        rpc('removerPublicadorDoEvento', ev.id, idPub).then(function() {
          tst('Removido', 'info', 1500);
          fecharPainel();
          atualizarVisaoAtual();
        }).catch(trataErro);
      });
    });

    $('#evCancelar').addEventListener('click', fecharPainel);
    $('#evSalvar').addEventListener('click', function() { salvarEvento(ev, p); });
    if (ev && ev.status !== 'concluido') {
      $('#evConcluir').addEventListener('click', function() { abrirPainelConcluir(ev); });
    }
    if (ev) $('#evExcluir').addEventListener('click', function() {
      var hasSerie = ev.serieId && ui.eventos.some(function(e) { return e.serieId === ev.serieId && e.id !== ev.id; });
      var escopo = 'unica';
      if (hasSerie) {
        if (!confirm('Excluir SÓ esta ocorrência? (Cancele e use "OK". Pra excluir TODA a série, cancele aqui e tente de novo.)')) {
          if (!confirm('Excluir TODA a série?')) return;
          escopo = 'serie';
        }
      } else {
        if (!confirm('Excluir esse evento?')) return;
      }
      rpc('excluirEvento', ev.id, escopo).then(function() {
        tst('Evento excluído', 'info');
        fecharPainel();
        atualizarVisaoAtual();
      }).catch(trataErro);
    });
  }

  function salvarEvento(ev, original) {
    var payload = {
      id: ev ? ev.id : null,
      equipamentoId: $('#evEq').value,
      pontoId: $('#evPonto').value,
      pontoAvulso: $('#evPontoAv').value.trim(),
      data: $('#evData').value,
      horaInicio: $('#evIni').value,
      horaFim: $('#evFim').value,
      publicadores: (original && original.publicadores) || [],
      notas: $('#evNotas').value.trim()
    };
    if (ev) {
      // edita só esta ocorrência
      rpc('atualizarEvento', ev.id, payload).then(function() {
        tst('Evento atualizado', 'success');
        fecharPainel();
        atualizarVisaoAtual();
      }).catch(trataErro);
    } else {
      payload.recorrenciaTipo = $('#evRec').value;
      payload.recorrenciaFim = $('#evRecFim').value || '';
      rpc('criarEvento', payload).then(function(r) {
        tst('Criado: ' + r.ocorrencias + ' ocorrência(s)', 'success');
        fecharPainel();
        atualizarVisaoAtual();
      }).catch(trataErro);
    }
  }

  function abrirPainelConcluir(ev) {
    var body = (
      '<form onsubmit="return false">' +
        '<div class="field" style="margin-bottom:12px"><label>Estado das rodas</label>' +
          '<select class="select" id="coRodas"><option value="">—</option><option value="ok">OK</option><option value="atencao">Atenção</option><option value="problema">Problema</option></select></div>' +
        '<div class="field" style="margin-bottom:12px"><label>Estado do display</label>' +
          '<select class="select" id="coDisplay"><option value="">—</option><option value="ok">OK</option><option value="atencao">Atenção</option><option value="problema">Problema</option></select></div>' +
        '<div class="field" style="margin-bottom:12px"><label>Estoque restante</label>' +
          '<input class="input" type="number" id="coEstoque" min="0" max="9999" placeholder="Quantas publicações sobraram"></div>' +
        '<div class="field"><label>Notas</label>' +
          '<textarea class="textarea" id="coNotas" rows="2" maxlength="500"></textarea></div>' +
      '</form>'
    );
    var foot = '<button class="btn" id="coVoltar">Voltar</button>' +
               '<button class="btn btn-primary" id="coSalvar">Concluir</button>';
    abrirPainel('Concluir evento', body, foot);
    $('#coVoltar').addEventListener('click', function() { abrirPainelEvento(ev.id); });
    $('#coSalvar').addEventListener('click', function() {
      var est = {
        estadoRodas: $('#coRodas').value,
        estadoDisplay: $('#coDisplay').value,
        estoquePubs: $('#coEstoque').value === '' ? '' : Number($('#coEstoque').value),
        notasEstado: $('#coNotas').value.trim()
      };
      rpc('concluirEvento', ev.id, est).then(function() {
        tst('Evento concluído', 'success');
        fecharPainel();
        atualizarVisaoAtual();
      }).catch(trataErro);
    });
  }

  // ====== PUBLICADORES ======
  function renderPublicadores() {
    var cont = $('#publicadoresLista');
    if (!state.publicadores.length) {
      cont.innerHTML = '<div class="empty">Nenhum publicador cadastrado. Clique em <b>Novo publicador</b>.</div>';
      return;
    }
    var html = ['<div class="list">'];
    state.publicadores.forEach(function(p) {
      html.push(
        '<div class="list-row' + (p.ativo ? '' : ' inativo') + '" data-pub="' + esc(p.id) + '">' +
          '<i class="bi bi-person ico-big"></i>' +
          '<div style="flex:1"><div class="primary">' + esc(p.nome) +
            (p.ativo ? '' : ' <span class="pill bad">inativo</span>') + '</div>' +
            '<div class="secondary">' + (p.telefone ? '📱 ' + esc(p.telefone) : 'sem telefone') + '</div></div>' +
        '</div>'
      );
    });
    html.push('</div>');
    cont.innerHTML = html.join('');
    $$('.list-row[data-pub]', cont).forEach(function(r) {
      r.addEventListener('click', function() { abrirPainelPublicador(r.dataset.pub); });
    });
  }
  function abrirPainelPublicador(id) {
    var p = id ? publicadorById(id) : null;
    var body = (
      '<form onsubmit="return false">' +
        '<div class="field" style="margin-bottom:12px"><label>Nome *</label>' +
          '<input class="input" id="pubNome" maxlength="120" value="' + esc(p ? p.nome : '') + '"></div>' +
        '<div class="field" style="margin-bottom:12px"><label>Telefone</label>' +
          '<input class="input" id="pubTel" maxlength="30" value="' + esc(p ? p.telefone : '') + '"></div>' +
        '<div class="field" style="margin-bottom:12px"><label>Notas</label>' +
          '<textarea class="textarea" id="pubNotas" rows="2" maxlength="500">' + esc(p ? p.notas : '') + '</textarea></div>' +
        '<label class="check"><input type="checkbox" id="pubAtivo"' + ((!p || p.ativo) ? ' checked' : '') + '> Ativo (pode agendar)</label>' +
      '</form>'
    );
    var foot = (
      (p ? '<button class="btn btn-danger danger" id="pubExcluir"><i class="bi bi-trash"></i> Excluir</button>' : '') +
      '<button class="btn" id="pubCancelar">Cancelar</button>' +
      '<button class="btn btn-primary" id="pubSalvar">Salvar</button>'
    );
    abrirPainel(p ? 'Editar publicador' : 'Novo publicador', body, foot);
    $('#pubCancelar').addEventListener('click', fecharPainel);
    $('#pubSalvar').addEventListener('click', function() {
      var payload = {
        id: p ? p.id : null,
        nome: $('#pubNome').value.trim(),
        telefone: $('#pubTel').value.trim(),
        notas: $('#pubNotas').value.trim(),
        ativo: $('#pubAtivo').checked
      };
      if (!payload.nome) return tst('Nome é obrigatório', 'warn');
      var fn = p ? 'atualizarPublicador' : 'criarPublicador';
      rpc(fn, payload).then(function() { tst('Publicador salvo', 'success'); fecharPainel(); carregarTudo(); }).catch(trataErro);
    });
    if (p) $('#pubExcluir').addEventListener('click', function() {
      if (!confirm('EXCLUIR ' + p.nome + '? Bloqueia se há eventos ativos.')) return;
      rpc('excluirPublicadorDefinitivo', p.id).then(function() { tst('Excluído', 'info'); fecharPainel(); carregarTudo(); }).catch(trataErro);
    });
  }

  // ====== PONTOS ======
  function renderPontos() {
    var cont = $('#pontosLista');
    if (!state.pontos.length) {
      cont.innerHTML = '<div class="empty">Nenhum ponto cadastrado.</div>';
      return;
    }
    var html = ['<div class="list">'];
    state.pontos.forEach(function(p) {
      html.push(
        '<div class="list-row' + (p.ativo ? '' : ' inativo') + '" data-pt="' + esc(p.id) + '">' +
          '<i class="bi bi-geo-alt ico-big"></i>' +
          '<div style="flex:1"><div class="primary">' + esc(p.nome) + (p.ativo ? '' : ' <span class="pill bad">inativo</span>') + '</div>' +
          (p.endereco ? '<div class="secondary">' + esc(p.endereco) + '</div>' : '') + '</div>' +
          '<div class="meta">' + (p.lat ? p.lat.toFixed(4) + ', ' + p.lng.toFixed(4) : '—') + '</div>' +
        '</div>'
      );
    });
    html.push('</div>');
    cont.innerHTML = html.join('');
    $$('.list-row[data-pt]', cont).forEach(function(r) {
      r.addEventListener('click', function() { abrirPainelPonto(r.dataset.pt); });
    });
  }
  function abrirPainelPonto(id) {
    var p = id ? pontoById(id) : null;
    var body = (
      '<form onsubmit="return false">' +
        '<div class="field" style="margin-bottom:12px"><label>Nome *</label>' +
          '<input class="input" id="pNome" maxlength="120" value="' + esc(p ? p.nome : '') + '"></div>' +
        '<div class="field" style="margin-bottom:12px"><label>Endereço</label>' +
          '<input class="input" id="pEndereco" maxlength="240" value="' + esc(p ? p.endereco : '') + '"></div>' +
        '<div class="field" style="margin-bottom:12px"><label>Localização * <span style="color:var(--muted);font-weight:400">(clique no mapa)</span></label>' +
          '<div id="pMapa" class="mapa"></div>' +
          '<div style="display:flex;gap:8px;margin-top:8px">' +
            '<input class="input" id="pLat" type="number" step="0.000001" placeholder="Latitude" value="' + (p && p.lat ? p.lat : '') + '">' +
            '<input class="input" id="pLng" type="number" step="0.000001" placeholder="Longitude" value="' + (p && p.lng ? p.lng : '') + '">' +
          '</div></div>' +
        '<div class="field" style="margin-bottom:12px"><label>Notas</label>' +
          '<textarea class="textarea" id="pNotas" rows="2" maxlength="500">' + esc(p ? p.notas : '') + '</textarea></div>' +
        '<label class="check"><input type="checkbox" id="pAtivo"' + ((!p || p.ativo) ? ' checked' : '') + '> Ativo</label>' +
      '</form>'
    );
    var foot = (
      (p ? '<button class="btn btn-danger danger" id="pExcluir"><i class="bi bi-trash"></i> Excluir</button>' : '') +
      '<button class="btn" id="pCancelar">Cancelar</button>' +
      '<button class="btn btn-primary" id="pSalvar">Salvar</button>'
    );
    abrirPainel(p ? 'Editar ponto' : 'Novo ponto', body, foot);
    setTimeout(montarMapaPonto, 220);
    $('#pLat').addEventListener('change', sincMapaInputs);
    $('#pLng').addEventListener('change', sincMapaInputs);
    $('#pCancelar').addEventListener('click', fecharPainel);
    $('#pSalvar').addEventListener('click', function() { salvarPonto(p && p.id); });
    if (p) $('#pExcluir').addEventListener('click', function() {
      if (!confirm('EXCLUIR esse ponto? Bloqueia se há eventos ligados.')) return;
      rpc('excluirPontoDefinitivo', p.id).then(function() { tst('Excluído', 'info'); fecharPainel(); carregarTudo(); }).catch(trataErro);
    });
  }
  function montarMapaPonto() {
    var lat = parseFloat($('#pLat').value), lng = parseFloat($('#pLng').value);
    var centro = (isFinite(lat) && isFinite(lng)) ? [lat, lng] : [-15.78, -47.93];
    ui.mapa = L.map('pMapa').setView(centro, isFinite(lat) ? 16 : 5);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19, attribution: '© OpenStreetMap' }).addTo(ui.mapa);
    if (isFinite(lat) && isFinite(lng)) colocarPin(lat, lng, false);
    ui.mapa.on('click', function(e) { colocarPin(e.latlng.lat, e.latlng.lng, true); });
    setTimeout(function() { if (ui.mapa) ui.mapa.invalidateSize(); }, 60);
  }
  function colocarPin(lat, lng, atualizaInputs) {
    if (atualizaInputs) { $('#pLat').value = lat.toFixed(6); $('#pLng').value = lng.toFixed(6); }
    if (ui.marcador) ui.marcador.setLatLng([lat, lng]);
    else {
      ui.marcador = L.marker([lat, lng], { draggable: true }).addTo(ui.mapa);
      ui.marcador.on('dragend', function(e) {
        var ll = e.target.getLatLng();
        $('#pLat').value = ll.lat.toFixed(6); $('#pLng').value = ll.lng.toFixed(6);
      });
    }
  }
  function sincMapaInputs() {
    var lat = parseFloat($('#pLat').value), lng = parseFloat($('#pLng').value);
    if (isFinite(lat) && isFinite(lng) && ui.mapa) {
      colocarPin(lat, lng, false);
      ui.mapa.setView([lat, lng], 16);
    }
  }
  function salvarPonto(id) {
    var payload = {
      id: id || '',
      nome: $('#pNome').value.trim(),
      endereco: $('#pEndereco').value.trim(),
      lat: parseFloat($('#pLat').value),
      lng: parseFloat($('#pLng').value),
      notas: $('#pNotas').value.trim(),
      ativo: $('#pAtivo').checked
    };
    if (!payload.nome) return tst('Nome é obrigatório', 'warn');
    if (!isFinite(payload.lat) || !isFinite(payload.lng)) return tst('Marque no mapa', 'warn');
    var fn = payload.id ? 'atualizarPonto' : 'criarPonto';
    rpc(fn, payload).then(function() { tst('Ponto salvo', 'success'); fecharPainel(); carregarTudo(); }).catch(trataErro);
  }

  // ====== EQUIPAMENTOS ======
  function renderEquipamentos() {
    var cont = $('#equipamentosLista');
    if (!state.equipamentos.length) {
      cont.innerHTML = '<div class="empty">Nenhum equipamento cadastrado.</div>';
      return;
    }
    var html = ['<div class="list">'];
    state.equipamentos.forEach(function(e) {
      var ico = e.tipo === 'display' ? 'bi-tablet' : 'bi-cart3';
      html.push(
        '<div class="list-row' + (e.ativo ? '' : ' inativo') + '" data-eq="' + esc(e.id) + '">' +
          '<i class="bi ' + ico + ' ico-big"></i>' +
          '<div style="flex:1"><div class="primary">' +
            '<span class="swatch" style="background:' + esc(e.cor) + '"></span> ' +
            esc(e.nome) + ' <span class="pill muted">' + esc(e.tipo) + '</span>' +
            (e.ativo ? '' : ' <span class="pill bad">inativo</span>') + '</div>' +
          '<div class="secondary">' + (e.localGuardaPadrao ? '📦 ' + esc(e.localGuardaPadrao) : 'sem local padrão') + '</div></div>' +
        '</div>'
      );
    });
    html.push('</div>');
    cont.innerHTML = html.join('');
    $$('.list-row[data-eq]', cont).forEach(function(r) {
      r.addEventListener('click', function() { abrirPainelEquipamento(r.dataset.eq); });
    });
  }
  function abrirPainelEquipamento(id) {
    var e = id ? equipamentoById(id) : null;
    var overrides = {};
    if (e) state.equipamentoLocais.filter(function(o) { return o.equipamentoId === e.id; })
      .forEach(function(o) { overrides[o.diaSemana] = o.localGuarda; });
    var ovs = [];
    for (var d = 0; d < 7; d++) {
      ovs.push(
        '<div class="field" style="margin-bottom:6px"><label>' + DIAS[d] + '</label>' +
          '<input class="input" data-ov="' + d + '" maxlength="240" placeholder="(usa padrão)" value="' + esc(overrides[d] || '') + '"></div>'
      );
    }
    var body = (
      '<form onsubmit="return false">' +
        '<div style="display:flex;gap:10px;margin-bottom:12px">' +
          '<div class="field" style="flex:2"><label>Nome *</label>' +
            '<input class="input" id="eNome" maxlength="120" value="' + esc(e ? e.nome : '') + '"></div>' +
          '<div class="field" style="flex:1"><label>Tipo</label>' +
            '<select class="select" id="eTipo">' +
              '<option value="carrinho"' + (e && e.tipo === 'carrinho' ? ' selected' : '') + '>Carrinho</option>' +
              '<option value="display"' + (e && e.tipo === 'display' ? ' selected' : '') + '>Display</option>' +
            '</select></div>' +
        '</div>' +
        '<div class="field" style="margin-bottom:12px"><label>Cor (na agenda)</label>' +
          '<input class="input" type="color" id="eCor" value="' + esc(e && e.cor ? e.cor : '#2563eb') + '" style="height:42px"></div>' +
        '<div class="field" style="margin-bottom:12px"><label>Local de guarda padrão</label>' +
          '<input class="input" id="eLocal" maxlength="240" placeholder="Ex: Salão do Reino" value="' + esc(e ? e.localGuardaPadrao : '') + '"></div>' +
        '<div class="field" style="margin-bottom:12px"><label>Notas</label>' +
          '<textarea class="textarea" id="eNotas" rows="2" maxlength="500">' + esc(e ? e.notas : '') + '</textarea></div>' +
        '<label class="check" style="margin-bottom:14px"><input type="checkbox" id="eAtivo"' + ((!e || e.ativo) ? ' checked' : '') + '> Ativo</label>' +
        '<hr>' +
        '<div style="color:var(--muted);font-size:.86rem;margin-bottom:10px"><strong>Override por dia</strong> — vazio = usa padrão.</div>' +
        ovs.join('') +
      '</form>'
    );
    var foot = (
      (e ? '<button class="btn btn-danger danger" id="eExcluir"><i class="bi bi-trash"></i> Excluir</button>' : '') +
      '<button class="btn" id="eCancelar">Cancelar</button>' +
      '<button class="btn btn-primary" id="eSalvar">Salvar</button>'
    );
    abrirPainel(e ? 'Editar equipamento' : 'Novo equipamento', body, foot);
    $('#eCancelar').addEventListener('click', fecharPainel);
    $('#eSalvar').addEventListener('click', function() {
      var payload = {
        id: e ? e.id : '',
        nome: $('#eNome').value.trim(),
        tipo: $('#eTipo').value,
        cor: $('#eCor').value,
        localGuardaPadrao: $('#eLocal').value.trim(),
        notas: $('#eNotas').value.trim(),
        ativo: $('#eAtivo').checked
      };
      if (!payload.nome) return tst('Nome é obrigatório', 'warn');
      var fn = payload.id ? 'atualizarEquipamento' : 'criarEquipamento';
      rpc(fn, payload).then(function(r) {
        var eqId = payload.id || (r && r.id);
        var overrides = $$('[data-ov]')
          .map(function(inp) { return { diaSemana: Number(inp.dataset.ov), localGuarda: inp.value.trim() }; })
          .filter(function(o) { return o.localGuarda; });
        return rpc('definirEquipamentoLocaisLote', eqId, overrides);
      }).then(function() { tst('Equipamento salvo', 'success'); fecharPainel(); carregarTudo(); }).catch(trataErro);
    });
    if (e) $('#eExcluir').addEventListener('click', function() {
      if (!confirm('EXCLUIR esse equipamento? Bloqueia se há eventos ativos.')) return;
      rpc('excluirEquipamentoDefinitivo', e.id).then(function() { tst('Excluído', 'info'); fecharPainel(); carregarTudo(); }).catch(trataErro);
    });
  }

})();
</script>
