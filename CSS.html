<style>
  :root {
    --bg:        #f5f7fa;
    --surface:   #ffffff;
    --surface-2: #fafbfc;
    --border:    #e4e9f0;
    --border-2:  #d3dae2;
    --text:      #1a2332;
    --text-2:    #3b4859;
    --muted:     #7a8696;
    --accent:    #2563eb;
    --accent-2:  #1e40af;
    --accent-soft: #eef4ff;
    --ok:        #16a34a;
    --ok-soft:   #dcfce7;
    --warn:      #ea580c;
    --warn-soft: #ffedd5;
    --bad:       #dc2626;
    --bad-soft:  #fee2e2;
    --neutral:   #94a3b8;
    --side-w:    248px;
    --panel-w:   460px;
    --hora-w:    56px;
    --slot-h:    24px;  /* altura de 30min na grade */
    --r-sm:      8px;
    --r-md:      12px;
    --r-lg:      16px;
    --shadow-1:  0 1px 2px rgba(15, 23, 42, .04), 0 1px 3px rgba(15, 23, 42, .04);
    --shadow-2:  0 4px 12px rgba(15, 23, 42, .06), 0 2px 6px rgba(15, 23, 42, .04);
    --shadow-3:  0 16px 40px rgba(15, 23, 42, .14), 0 4px 16px rgba(15, 23, 42, .06);
    --t-fast:    140ms cubic-bezier(.2, .8, .2, 1);
    --t-med:     220ms cubic-bezier(.2, .8, .2, 1);
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    -webkit-tap-highlight-color: transparent;
    font-size: 15px; line-height: 1.45;
  }
  @media (prefers-reduced-motion: reduce) {
    * { transition-duration: .01ms !important; animation-duration: .01ms !important; }
  }
  h1, h2, h3, h4, h5 { margin: 0; font-weight: 600; letter-spacing: -.015em; color: var(--text); }
  hr { border: 0; border-top: 1px solid var(--border); margin: 18px 0; }
  button { font-family: inherit; }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: #cbd2da; border-radius: 6px; }

  /* ==== Shell ==== */
  .app { display: grid; grid-template-columns: var(--side-w) 1fr; min-height: 100vh; }
  .sidebar {
    background: var(--surface); border-right: 1px solid var(--border);
    padding: 22px 16px 18px;
    display: flex; flex-direction: column;
    position: sticky; top: 0;
    height: 100vh; overflow-y: auto;
  }
  .brand {
    display: flex; align-items: center; gap: 10px;
    font-weight: 700; font-size: 1.05rem;
    padding: 6px 10px; margin-bottom: 18px;
  }
  .brand .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 0 4px var(--accent-soft); }
  .nav-group { margin-top: 6px; }
  .nav-label {
    font-size: .72rem; font-weight: 700; text-transform: uppercase;
    color: var(--muted); letter-spacing: .08em; padding: 10px 12px 6px;
  }
  .nav-item {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 12px; margin: 1px 0; border-radius: 10px;
    color: var(--text-2); cursor: pointer; user-select: none;
    font-size: .96rem; font-weight: 500;
    transition: background var(--t-fast);
  }
  .nav-item:hover { background: var(--surface-2); }
  .nav-item.active { background: var(--accent-soft); color: var(--accent-2); font-weight: 600; }
  .nav-item .ico { width: 20px; text-align: center; color: var(--muted); font-size: 1.05rem; }
  .nav-item.active .ico { color: var(--accent); }
  .sidebar-footer { margin-top: auto; padding-top: 18px; display: flex; flex-direction: column; gap: 6px; }
  .sidebar-footer .versao { font-size: .72rem; color: var(--muted); text-align: center; margin-top: 10px; }

  .main { padding: 24px 24px 100px; min-width: 0; }
  .page-head {
    display: flex; align-items: center; justify-content: space-between;
    gap: 18px; flex-wrap: wrap; margin-bottom: 18px;
  }
  .page-head h2 { font-size: 1.4rem; }
  .page-head .subtitle { color: var(--muted); font-size: .9rem; margin-top: 4px; }

  /* ==== Botões ==== */
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    min-height: 38px; padding: 7px 14px;
    border-radius: 10px; border: 1px solid transparent;
    background: var(--surface); color: var(--text);
    font-size: .92rem; font-weight: 500; cursor: pointer;
    box-shadow: var(--shadow-1);
    transition: background var(--t-fast), box-shadow var(--t-fast), transform var(--t-fast);
  }
  .btn:hover { background: #f3f5f9; box-shadow: var(--shadow-2); }
  .btn:active { transform: translateY(1px); box-shadow: var(--shadow-1); }
  .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn-primary:hover { background: var(--accent-2); border-color: var(--accent-2); }
  .btn-ghost { background: transparent; box-shadow: none; }
  .btn-ghost:hover { background: var(--surface-2); box-shadow: none; }
  .btn-danger { background: var(--bad-soft); color: var(--bad); border-color: #fdd0d0; }
  .btn-danger:hover { background: #fbd4d4; }
  .btn-icon { min-width: 38px; padding: 0; }
  .btn-sm { min-height: 32px; padding: 5px 11px; font-size: .85rem; }
  .btn-xs { min-height: 28px; padding: 3px 9px; font-size: .8rem; border-radius: 7px; }

  /* ==== Inputs ==== */
  .field { display: flex; flex-direction: column; gap: 6px; }
  .field label, .label { font-size: .82rem; color: var(--text-2); font-weight: 600; }
  .input, .select, .textarea {
    border: 1.5px solid var(--border-2);
    background: #fff; border-radius: 10px;
    padding: 8px 11px; font: inherit; font-size: .94rem;
    color: var(--text); min-height: 38px; width: 100%;
    transition: border-color var(--t-fast), box-shadow var(--t-fast);
  }
  .input:focus, .select:focus, .textarea:focus {
    outline: none; border-color: var(--accent);
    box-shadow: 0 0 0 4px var(--accent-soft);
  }
  .textarea { resize: vertical; min-height: 64px; }
  .check { display: inline-flex; align-items: center; gap: 10px; cursor: pointer; font-size: .92rem; }
  .check input { width: 18px; height: 18px; cursor: pointer; accent-color: var(--accent); }

  /* ==== Lista / card ==== */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-md); padding: 16px; box-shadow: var(--shadow-1); }
  .empty { text-align: center; color: var(--muted); padding: 40px 20px; background: var(--surface); border: 1px dashed var(--border-2); border-radius: var(--r-md); }
  .list { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-md); overflow: hidden; box-shadow: var(--shadow-1); }
  .list-row { display: flex; align-items: center; gap: 14px; padding: 14px 18px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background var(--t-fast); }
  .list-row:last-child { border-bottom: 0; }
  .list-row:hover { background: var(--surface-2); }
  .list-row.inativo { opacity: .55; }
  .list-row .primary { font-weight: 600; }
  .list-row .secondary { color: var(--muted); font-size: .85rem; margin-top: 2px; }
  .list-row .meta { margin-left: auto; color: var(--muted); font-size: .82rem; }
  .list-row .ico-big { font-size: 1.25rem; color: var(--accent); width: 26px; text-align: center; }
  .swatch { width: 14px; height: 14px; border-radius: 4px; display: inline-block; vertical-align: middle; border: 1px solid rgba(0,0,0,.1); }

  /* ==== Painel lateral ==== */
  .panel {
    position: fixed; top: 0; right: 0; bottom: 0;
    width: var(--panel-w);
    background: var(--surface); border-left: 1px solid var(--border);
    box-shadow: var(--shadow-3);
    transform: translateX(100%);
    transition: transform var(--t-med);
    display: flex; flex-direction: column;
    z-index: 50;
  }
  .panel.open { transform: translateX(0); }
  .panel-head { display: flex; align-items: center; justify-content: space-between; padding: 18px 22px; border-bottom: 1px solid var(--border); }
  .panel-head h3 { font-size: 1.1rem; }
  .panel-body { padding: 18px 22px; flex: 1; overflow-y: auto; }
  .panel-foot { padding: 14px 22px; border-top: 1px solid var(--border); display: flex; gap: 10px; justify-content: flex-end; background: var(--surface-2); flex-wrap: wrap; }
  .panel-foot .danger { margin-right: auto; }
  .panel-backdrop { position: fixed; inset: 0; background: rgba(15,23,42,.25); opacity: 0; pointer-events: none; transition: opacity var(--t-med); z-index: 49; }
  .panel-backdrop.show { opacity: 1; pointer-events: auto; }

  /* ============ Agenda semanal ============ */
  .planner-toolbar {
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    background: var(--surface); border: 1px solid var(--border);
    padding: 10px 14px; border-radius: 12px; box-shadow: var(--shadow-1);
    margin-bottom: 16px;
  }
  .planner-toolbar .seletor { min-width: 220px; max-width: 320px; flex: 1; }
  .planner-toolbar .range { font-weight: 600; min-width: 230px; text-align: center; color: var(--text-2); }

  .agenda {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--r-md); overflow: hidden; box-shadow: var(--shadow-1);
  }
  .agenda-head {
    display: grid;
    grid-template-columns: var(--hora-w) repeat(7, 1fr);
    border-bottom: 1px solid var(--border);
    background: var(--surface-2);
    position: sticky; top: 0; z-index: 5;
  }
  .agenda-head .col-h, .agenda-head .col-d {
    padding: 10px 6px; text-align: center; border-right: 1px solid var(--border);
  }
  .agenda-head .col-d:last-child { border-right: 0; }
  .agenda-head .dia-nome {
    color: var(--muted); font-size: .7rem;
    text-transform: uppercase; letter-spacing: .08em; font-weight: 700;
  }
  .agenda-head .dia-num { font-weight: 700; font-size: 1.1rem; margin-top: 2px; }
  .agenda-head .col-d.hoje .dia-num { color: var(--accent); }

  .agenda-body {
    display: grid;
    grid-template-columns: var(--hora-w) repeat(7, 1fr);
    position: relative;
  }
  .col-horas {
    border-right: 1px solid var(--border);
    background: var(--surface-2);
  }
  .col-horas .marca {
    height: calc(var(--slot-h) * 2); /* 1h */
    border-bottom: 1px solid var(--border);
    font-size: .72rem; color: var(--muted);
    padding: 2px 6px; text-align: right;
  }
  .col-dia {
    border-right: 1px solid var(--border);
    position: relative;
    background-image:
      linear-gradient(to bottom, transparent calc(var(--slot-h) * 2 - 1px), var(--border) calc(var(--slot-h) * 2 - 1px), var(--border) calc(var(--slot-h) * 2), transparent calc(var(--slot-h) * 2));
    background-size: 100% calc(var(--slot-h) * 2);
    touch-action: none; /* permite arrasto via pointer events no mobile */
  }
  .col-dia:last-child { border-right: 0; }
  .col-dia.hoje { background-color: rgba(37, 99, 235, .04); }
  .col-dia.alvo-drag { background-color: rgba(37, 99, 235, .14) !important; outline: 2px dashed var(--accent); outline-offset: -2px; }

  .evento {
    position: absolute; left: 2px; right: 2px;
    border-radius: 6px; padding: 4px 6px 8px 6px;
    color: #fff; font-size: .78rem; line-height: 1.2;
    overflow: hidden; cursor: pointer;
    border: 1px solid rgba(0, 0, 0, .12);
    box-shadow: 0 1px 2px rgba(0, 0, 0, .08);
    transition: box-shadow var(--t-fast);
    min-height: 16px;
    user-select: none;
    touch-action: none;
  }
  .evento.movel { cursor: grab; }
  .evento.movel:active { cursor: grabbing; }
  .evento.concluido { opacity: .65; }
  .evento.cancelado { opacity: .4; text-decoration: line-through; }
  .evento.ghost {
    outline: 2px solid rgba(255, 255, 255, .55);
    box-shadow: 0 8px 24px rgba(0, 0, 0, .22);
    pointer-events: none;
  }
  .evento .ev-resize {
    position: absolute; left: 0; right: 0; bottom: 0;
    height: 7px; cursor: ns-resize;
    background: linear-gradient(transparent, rgba(0,0,0,.18));
    border-radius: 0 0 6px 6px;
  }
  .evento .ev-resize::after {
    content: ''; display: block;
    width: 22px; height: 2px; margin: 3px auto 0;
    background: rgba(255,255,255,.55); border-radius: 2px;
  }
  .evento.concluido .ev-resize, .evento.cancelado .ev-resize { display: none; }
  .evento:hover { transform: scale(1.01); box-shadow: 0 4px 10px rgba(0, 0, 0, .15); z-index: 3; }
  .evento.concluido { opacity: .65; }
  .evento.cancelado { opacity: .4; text-decoration: line-through; }
  .evento .ev-titulo { font-weight: 600; }
  .evento .ev-meta { opacity: .85; font-size: .7rem; margin-top: 1px; }
  .evento .ev-pubs { font-size: .7rem; opacity: .85; }

  /* Click-to-create no fundo */
  .col-dia .ghost-click {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0; cursor: pointer;
  }

  .legenda {
    display: flex; flex-wrap: wrap; gap: 12px; margin-top: 10px;
    color: var(--muted); font-size: .82rem;
  }
  .legenda .item { display: inline-flex; align-items: center; gap: 6px; }
  .legenda .sw { width: 14px; height: 10px; border-radius: 3px; border: 1px solid rgba(0,0,0,.1); }

  /* ==== Pílulas ==== */
  .pill {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 2px 9px; border-radius: 999px;
    font-size: .74rem; font-weight: 600;
  }
  .pill.muted    { background: var(--surface-2); color: var(--muted); }
  .pill.ok       { background: var(--ok-soft);   color: #166534; }
  .pill.warn     { background: var(--warn-soft); color: #9a3412; }
  .pill.bad      { background: var(--bad-soft);  color: #991b1b; }
  .pill.accent   { background: var(--accent-soft); color: var(--accent-2); }

  /* Chips (pubs no painel) */
  .pubs-stack { display: flex; flex-wrap: wrap; gap: 6px; }
  .pub-chip {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--accent-soft); color: var(--accent-2);
    padding: 4px 8px 4px 10px; border-radius: 999px;
    font-size: .85rem; font-weight: 500;
  }
  .pub-chip button {
    background: none; border: 0; cursor: pointer; padding: 0 2px;
    border-radius: 4px; color: var(--accent-2); font-size: .9rem;
  }
  .pub-chip button:hover { background: rgba(0, 0, 0, .06); }

  /* Mapa */
  .mapa { height: 300px; width: 100%; border-radius: 10px; border: 1px solid var(--border-2); }

  /* Topbar mobile */
  .topbar-mobile {
    display: none;
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 10px 14px; align-items: center; gap: 12px;
    position: sticky; top: 0; z-index: 40;
  }
  .topbar-mobile .brand { margin: 0; }
  .menu-btn { background: none; border: 0; cursor: pointer; padding: 6px 10px; border-radius: 8px; font-size: 1.4rem; color: var(--text-2); }
  .menu-btn:hover { background: var(--surface-2); }

  @media (max-width: 1200px) {
    .agenda { overflow-x: auto; }
    .agenda-head, .agenda-body { min-width: 880px; }
  }
  @media (max-width: 720px) {
    .app { grid-template-columns: 1fr; }
    .sidebar { position: fixed; left: 0; top: 0; bottom: 0; z-index: 60; width: 264px; transform: translateX(-100%); transition: transform var(--t-med); height: 100vh; }
    .sidebar.open { transform: translateX(0); }
    .topbar-mobile { display: flex; }
    .main { padding: 14px 14px 100px; }
    .page-head { flex-direction: column; align-items: stretch; gap: 10px; }
    .planner-toolbar { flex-direction: column; align-items: stretch; }
    .planner-toolbar .range { min-width: auto; }
  }
</style>
