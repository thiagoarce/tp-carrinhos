<style>
  :root {
    --bg:        #f5f6f8;
    --surface:   #ffffff;
    --border:    #e3e6eb;
    --border-2:  #d3d8e0;
    --text:      #1f2933;
    --muted:     #6b7480;
    --accent:    #2563eb;
    --accent-2:  #1e40af;
    --ok:        #16a34a;
    --warn:      #d97706;
    --bad:       #dc2626;
    --neutral:   #94a3b8;
    --side-w:    240px;
    --panel-w:   380px;
    --radius:    8px;
    --shadow-1:  0 1px 2px rgba(15, 23, 42, .06);
    --shadow-2:  0 8px 24px rgba(15, 23, 42, .12);
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    -webkit-tap-highlight-color: transparent;
    font-size: 14px;
  }
  a { color: var(--accent); }
  h1, h2, h3, h4, h5, h6 { margin: 0; font-weight: 600; letter-spacing: -.01em; }
  hr { border: 0; border-top: 1px solid var(--border); margin: 16px 0; }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: #cbd2da; border-radius: 6px; }
  ::-webkit-scrollbar-thumb:hover { background: #b3bcc6; }

  /* ========== Layout shell ========== */
  .app {
    display: grid;
    grid-template-columns: var(--side-w) 1fr;
    min-height: 100vh;
  }
  .sidebar {
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 18px 14px;
    display: flex; flex-direction: column;
    position: sticky; top: 0;
    height: 100vh;
    overflow-y: auto;
  }
  .brand {
    display: flex; align-items: center; gap: 8px;
    font-weight: 700; font-size: 1.05rem;
    padding: 4px 8px; margin-bottom: 16px;
  }
  .brand .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); }
  .nav-group { margin-top: 14px; }
  .nav-label {
    font-size: .7rem; font-weight: 700; text-transform: uppercase;
    color: var(--muted); letter-spacing: .06em;
    padding: 4px 10px; margin-bottom: 4px;
  }
  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 10px; border-radius: 6px;
    color: var(--text); cursor: pointer; user-select: none;
    font-size: .93rem;
    transition: background .12s;
  }
  .nav-item:hover { background: #eef1f5; }
  .nav-item.active { background: #e7eefc; color: var(--accent-2); font-weight: 600; }
  .nav-item .ico { width: 18px; text-align: center; color: var(--muted); }
  .nav-item.active .ico { color: var(--accent-2); }

  .sidebar-footer { margin-top: auto; padding-top: 16px; }
  .sidebar-footer .btn { width: 100%; }
  .sidebar-footer .versao { font-size: .7rem; color: var(--muted); text-align: center; margin-top: 8px; }

  /* ========== Conteúdo principal ========== */
  .main {
    padding: 24px 28px 80px;
    min-width: 0;
  }
  .page-head {
    display: flex; align-items: center; justify-content: space-between;
    gap: 16px; flex-wrap: wrap;
    margin-bottom: 18px;
  }
  .page-head h2 {
    font-size: 1.35rem;
  }
  .page-head .subtitle { color: var(--muted); font-size: .9rem; margin-top: 2px; }

  /* ========== Botões mínimos (override Bootstrap quando precisa) ========== */
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    min-height: 36px;
    padding: 6px 14px;
    border-radius: 6px;
    border: 1px solid transparent;
    background: #e5e9f0;
    color: var(--text);
    font-size: .92rem; font-weight: 500;
    cursor: pointer;
    transition: background .12s, border-color .12s;
  }
  .btn:hover { background: #dadfe7; }
  .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn-primary:hover { background: var(--accent-2); border-color: var(--accent-2); }
  .btn-ghost { background: transparent; }
  .btn-ghost:hover { background: #eef1f5; }
  .btn-danger { background: #fde8e8; color: var(--bad); border-color: #fdd0d0; }
  .btn-danger:hover { background: #fbd4d4; }
  .btn-icon { min-width: 36px; min-height: 36px; padding: 0; }
  .btn-sm { min-height: 30px; padding: 4px 10px; font-size: .85rem; }
  .btn-xs { min-height: 26px; padding: 2px 8px; font-size: .8rem; }

  /* ========== Inputs ========== */
  .field { display: flex; flex-direction: column; gap: 4px; }
  .field label, .label { font-size: .8rem; color: var(--muted); font-weight: 500; }
  .input, .select, .textarea {
    border: 1px solid var(--border-2);
    background: #fff;
    border-radius: 6px;
    padding: 8px 10px;
    font: inherit;
    color: var(--text);
    min-height: 36px;
    width: 100%;
  }
  .input:focus, .select:focus, .textarea:focus {
    outline: none; border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(37, 99, 235, .15);
  }
  .textarea { resize: vertical; min-height: 64px; }
  .check { display: inline-flex; align-items: center; gap: 8px; cursor: pointer; }
  .check input { width: 16px; height: 16px; cursor: pointer; }

  /* ========== Card / surface ========== */
  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px;
    box-shadow: var(--shadow-1);
  }
  .empty {
    text-align: center; color: var(--muted); padding: 32px 16px;
    background: var(--surface); border: 1px dashed var(--border-2); border-radius: var(--radius);
  }

  /* ========== Lista compacta (config) ========== */
  .list { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .list-row {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 16px; border-bottom: 1px solid var(--border);
    cursor: pointer; transition: background .1s;
  }
  .list-row:last-child { border-bottom: 0; }
  .list-row:hover { background: #f7f9fc; }
  .list-row.active { background: #e7eefc; }
  .list-row.inativo { opacity: .55; }
  .list-row .primary { font-weight: 600; }
  .list-row .secondary { color: var(--muted); font-size: .85rem; }
  .list-row .meta { margin-left: auto; color: var(--muted); font-size: .82rem; }

  /* ========== Painel lateral direito ========== */
  .panel {
    position: fixed; top: 0; right: 0; bottom: 0;
    width: var(--panel-w);
    background: var(--surface);
    border-left: 1px solid var(--border);
    box-shadow: var(--shadow-2);
    transform: translateX(100%);
    transition: transform .22s ease;
    display: flex; flex-direction: column;
    z-index: 50;
  }
  .panel.open { transform: translateX(0); }
  .panel-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 20px; border-bottom: 1px solid var(--border);
  }
  .panel-head h3 { font-size: 1.05rem; }
  .panel-body { padding: 16px 20px; flex: 1; overflow-y: auto; }
  .panel-foot {
    padding: 12px 20px; border-top: 1px solid var(--border);
    display: flex; gap: 8px; justify-content: flex-end; align-items: center;
  }
  .panel-foot .danger { margin-right: auto; }
  .panel-backdrop {
    position: fixed; inset: 0; background: rgba(15, 23, 42, .15);
    opacity: 0; pointer-events: none; transition: opacity .15s; z-index: 49;
  }
  .panel-backdrop.show { opacity: 1; pointer-events: auto; }

  /* ========== Planner semanal ========== */
  .planner-head {
    display: flex; align-items: center; gap: 10px; margin-bottom: 16px;
  }
  .planner-head .range { font-weight: 600; font-size: 1.05rem; min-width: 220px; text-align: center; }

  .planner {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 10px;
  }
  .day-col {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); overflow: hidden;
    display: flex; flex-direction: column;
    min-height: 200px;
  }
  .day-col.hoje { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
  .day-col.feriado { background: #fff7ed; }
  .day-head {
    padding: 8px 10px; border-bottom: 1px solid var(--border);
    background: #fafbfd;
    display: flex; align-items: baseline; justify-content: space-between;
  }
  .day-head .dia-num { font-weight: 700; font-size: 1.05rem; }
  .day-head .dia-nome { color: var(--muted); font-size: .75rem; text-transform: uppercase; letter-spacing: .04em; }
  .day-col.hoje .day-head { background: #eef4ff; }
  .day-col.feriado .day-head { background: #fed7aa; }

  .day-body { padding: 8px; display: flex; flex-direction: column; gap: 6px; flex: 1; }
  .day-body .feriado-tag {
    background: #fed7aa; color: #92400e; padding: 4px 8px; border-radius: 4px;
    font-size: .75rem; text-align: center;
  }

  .slot {
    border: 1px solid var(--border); border-left: 3px solid var(--neutral);
    border-radius: 6px; padding: 6px 8px; background: #fff;
    cursor: pointer; transition: background .1s, transform .1s;
    user-select: none;
  }
  .slot:hover { background: #f7f9fc; }
  .slot.vazio   { border-left-color: var(--neutral); }
  .slot.parcial { border-left-color: var(--warn); }
  .slot.cheio   { border-left-color: var(--ok); }
  .slot.lotado  { border-left-color: var(--bad); }
  .slot .titulo { font-weight: 600; font-size: .85rem; }
  .slot .meta   { color: var(--muted); font-size: .72rem; margin-top: 2px; display: flex; justify-content: space-between; }
  .slot .pessoas { font-size: .75rem; color: var(--text); margin-top: 4px; line-height: 1.25; }

  /* Pílulas/badges */
  .pill {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 1px 8px; border-radius: 999px;
    font-size: .72rem; font-weight: 600;
    background: #e5e9f0; color: var(--text);
  }
  .pill.ok        { background: #dcfce7; color: #14532d; }
  .pill.warn      { background: #fef3c7; color: #78350f; }
  .pill.bad       { background: #fee2e2; color: #7f1d1d; }
  .pill.muted     { background: #e5e9f0; color: var(--muted); }
  .pill.accent    { background: #dbeafe; color: var(--accent-2); }

  /* Painel de slot */
  .person-row {
    padding: 10px 0; border-bottom: 1px solid var(--border);
  }
  .person-row:last-child { border-bottom: 0; }
  .person-row .acoes { margin-top: 6px; display: flex; gap: 6px; flex-wrap: wrap; }

  /* Mapa */
  .mapa { height: 280px; width: 100%; border-radius: 6px; border: 1px solid var(--border-2); }

  /* Calendário mensal (mantido) */
  .cal-grid {
    display: grid; grid-template-columns: repeat(7, 1fr);
    gap: 4px; background: var(--border); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 4px;
  }
  .cal-head { background: #fafbfd; text-align: center; padding: 6px 0; font-size: .75rem; font-weight: 600; color: var(--muted); border-radius: 4px; }
  .cal-cell { background: #fff; min-height: 70px; padding: 6px; border-radius: 4px; font-size: .8rem; display: flex; flex-direction: column; gap: 2px; }
  .cal-cell.outro { background: #f3f5f8; color: var(--muted); }
  .cal-cell.hoje { outline: 2px solid var(--accent); }
  .cal-cell .dia-num { font-weight: 600; font-size: .9rem; }
  .cal-cell.feriado { background: #fed7aa; }
  .cal-slot {
    font-size: .68rem; line-height: 1.1; padding: 1px 4px; border-radius: 3px;
    color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .cal-slot.vazio   { background: var(--neutral); }
  .cal-slot.parcial { background: var(--warn); }
  .cal-slot.cheio   { background: var(--ok); }
  .cal-slot.lotado  { background: var(--bad); }

  /* Sidebar toggle no mobile */
  .topbar-mobile {
    display: none;
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 8px 12px; align-items: center; gap: 10px;
    position: sticky; top: 0; z-index: 40;
  }
  .topbar-mobile .brand { margin: 0; }
  .menu-btn { background: none; border: 0; cursor: pointer; padding: 4px 8px; }

  /* Responsividade */
  @media (max-width: 1100px) {
    .planner { grid-template-columns: repeat(7, minmax(110px, 1fr)); overflow-x: auto; }
  }
  @media (max-width: 900px) {
    :root { --side-w: 220px; --panel-w: 92vw; }
    .planner { display: flex; flex-direction: column; }
    .day-col { min-height: auto; }
  }
  @media (max-width: 720px) {
    .app { grid-template-columns: 1fr; }
    .sidebar {
      position: fixed; left: 0; top: 0; bottom: 0; z-index: 60;
      width: 260px;
      transform: translateX(-100%); transition: transform .2s ease;
      height: 100vh;
    }
    .sidebar.open { transform: translateX(0); }
    .topbar-mobile { display: flex; }
    .main { padding: 14px 14px 80px; }
  }
</style>
