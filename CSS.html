<style>
  body { -webkit-tap-highlight-color: transparent; }
  .btn { min-height: 44px; }
  .btn-icon { min-width: 44px; min-height: 44px; display: inline-flex; align-items: center; justify-content: center; }
  .btn-sm { min-height: 38px; }
  main { padding-bottom: 4rem; }
  code { word-break: break-all; }

  .nav-tabs .nav-link { cursor: pointer; border: 1px solid transparent; }
  .nav-tabs .nav-link.active { font-weight: 600; }

  .mapa-ponto {
    height: 320px;
    width: 100%;
    border-radius: 8px;
    border: 1px solid #ced4da;
    background: #eef2f7;
  }

  .card-tp { transition: transform .12s ease, box-shadow .12s ease; }
  .card-tp:hover { transform: translateY(-2px); box-shadow: 0 6px 16px rgba(0,0,0,.08); }
  .card-tp.inativo { opacity: .55; }
  .card-tp .badge-tipo { font-size: .75rem; }

  .slot-card { border-left: 4px solid #0d6efd; }
  .slot-card.cheio   { border-left-color: #dc3545; }
  .slot-card.vazio   { border-left-color: #adb5bd; }
  .slot-card.parcial { border-left-color: #ffc107; }
  .slot-card.feriado { border-left-color: #6c757d; background: #f8f9fa; }

  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
    background: #dee2e6;
    border: 1px solid #dee2e6;
    border-radius: 8px;
    padding: 4px;
  }
  .cal-head {
    background: #f1f3f5; text-align: center; padding: 6px 0;
    font-size: .8rem; font-weight: 600; color: #495057; border-radius: 4px;
  }
  .cal-cell {
    background: #fff; min-height: 70px; padding: 6px;
    border-radius: 4px; font-size: .8rem; position: relative;
    display: flex; flex-direction: column; gap: 2px;
  }
  .cal-cell.outro { background: #f8f9fa; color: #adb5bd; }
  .cal-cell.hoje { outline: 2px solid #0d6efd; }
  .cal-cell .dia-num { font-weight: 600; font-size: .9rem; }
  .cal-cell.feriado { background: #f8d7da; }
  .cal-slot {
    font-size: .7rem; line-height: 1.1; padding: 1px 4px; border-radius: 3px;
    color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .cal-slot.vazio   { background: #adb5bd; }
  .cal-slot.parcial { background: #fd7e14; }
  .cal-slot.cheio   { background: #dc3545; }

  .cal-dot { display: inline-block; width: 12px; height: 12px; border-radius: 3px; vertical-align: middle; margin-right: 4px; }
  .cal-dot.cal-vazio   { background: #adb5bd; }
  .cal-dot.cal-parcial { background: #fd7e14; }
  .cal-dot.cal-cheio   { background: #dc3545; }
  .cal-dot.cal-feriado { background: #6c757d; }

  .grp-ponto-titulo {
    background: #e9ecef; padding: 8px 12px; font-weight: 600;
    border-radius: 6px; margin-top: 12px; margin-bottom: 6px;
  }

  .badge-st-agendado  { background: #0d6efd !important; }
  .badge-st-presente  { background: #198754 !important; }
  .badge-st-concluido { background: #6c757d !important; }
  .badge-st-ausente   { background: #fd7e14 !important; }
  .badge-st-cancelado { background: #dc3545 !important; }

  @media (max-width: 600px) {
    .cal-cell { min-height: 56px; padding: 3px; font-size: .7rem; }
    .cal-head { font-size: .65rem; padding: 3px 0; }
    .cal-cell .dia-num { font-size: .75rem; }
    .nav-tabs .nav-link { padding: 6px 10px; font-size: .85rem; }
  }
</style>
